<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clock</title>
</head>

<body style="margin:0;background:white;color:black;">

<div id="clock" style="
position:fixed;
top:50%;
left:50%;
font-size:150px;
font-family:Arial;
font-weight:bold;
transform:translate(-50%,-50%);
">
Loading...
</div>

<script>
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;
  if (s < 10) s = "0" + s;

  document.getElementById("clock").innerHTML =
    h + ":" + m + ":" + s;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
